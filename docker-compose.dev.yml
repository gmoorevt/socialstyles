services:
  db:
    image: postgres:14
    container_name: socialstyles_db
    environment:
      POSTGRES_USER: socialstyles
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: social_styles_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialstyles"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: socialstyles_web
    environment:
      FLASK_APP: wsgi.py
      FLASK_CONFIG: development
      FLASK_DEBUG: "1"
      SECRET_KEY: local-dev-secret-key
      DATABASE_URL: postgresql://socialstyles:localdev@db:5432/social_styles_dev
      DEV_DATABASE_URL: postgresql://socialstyles:localdev@db:5432/social_styles_dev
      USE_SES: "False"
      APP_NAME: Social Styles Assessment
    ports:
      - "5001:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
